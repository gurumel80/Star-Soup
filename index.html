<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Soup — Number Bonds to 10</title>

<!-- Vercel Web Analytics -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>

<style>
/* Google Fonts — loads when online. Add font files to fonts/ folder for offline use. */
@import url('https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=Varela+Round&display=swap');
/* Self-hosted fallback — works offline once font files are in fonts/ folder */
@font-face {
  font-family: 'Andika';
  font-weight: 400;
  font-style: normal;
  src: url('fonts/Andika-Regular.ttf') format('truetype');
  font-display: swap;
}
@font-face {
  font-family: 'Andika';
  font-weight: 700;
  font-style: normal;
  src: url('fonts/Andika-Bold.ttf') format('truetype');
  font-display: swap;
}

:root {
  --sky: #080620;
  --violet: #6c3fc5;
  --gold: #f5c842;
  --mint: #5ef0b0;
  --glow-gold: rgba(245,200,66,0.55);
  --glow-purple: rgba(108,63,197,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Andika', 'Varela Round', sans-serif;
  background: var(--sky);
  color: #fff9f0;
  height: 100vh; overflow: hidden;
  user-select: none; -webkit-tap-highlight-color: transparent;
}

/* ── STARFIELD ── */
#starfield { position:fixed; inset:0; pointer-events:none; z-index:0; }

/* ══════════════════════════════
   SCREENS
══════════════════════════════ */
.screen {
  position: fixed; inset: 0; z-index: 50;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px;
}
.screen.hidden { display: none; }

/* ── START / OPTIONS SCREEN ── */
#start-screen {
  background: radial-gradient(ellipse at 50% 40%, #1e0a50 0%, #080620 70%);
}
.start-owl {
  font-size: 7rem; line-height: 1;
  animation: owlFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(245,200,66,0.6));
}
.start-title {
  font-family: 'Andika', 'Varela Round', sans-serif;
  font-size: 4rem; color: var(--gold); font-weight:700;
  text-shadow: 0 0 40px var(--glow-gold), 0 4px 0 #a07010;
}
.start-sub {
  font-size: 1.2rem; color: rgba(255,255,255,0.6); font-weight:700;
}
.rounds-label {
  font-family: 'Andika', 'Varela Round', sans-serif;
  font-size: 1.5rem; color: white;
  text-align: center;
}
.rounds-picker {
  display: flex; gap: 14px;
}
.round-opt {
  width: 80px; height: 80px;
  border-radius: 50%; border: 3px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.07);
  font-family: 'Andika', 'Varela Round', sans-serif; font-size: 2rem; color: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
}
.round-opt:hover { transform: scale(1.08); }
.round-opt.selected {
  background: linear-gradient(135deg, var(--violet), #4c1d95);
  border-color: #a78bfa;
  box-shadow: 0 0 24px var(--glow-purple);
  transform: scale(1.12);
}
.round-opt.selected::after {
  content: '✓';
  position: absolute; bottom: -8px; right: -4px;
  background: var(--gold); color: #1a0800;
  border-radius: 50%; width: 22px; height: 22px;
  font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
  font-family:'Andika', 'Varela Round', sans-serif; font-weight:700;
}
.big-btn {
  font-family: 'Andika', 'Varela Round', sans-serif; font-size: 1.5rem;
  border: none; border-radius: 50px; padding: 16px 52px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--violet), #4c1d95); color: white;
  box-shadow: 0 6px 0 #2d0d6b, 0 10px 30px rgba(108,63,197,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
}
.big-btn:active { transform: scale(0.95) translateY(4px); box-shadow: 0 2px 0 #2d0d6b; }

/* ── GAME LAYOUT ── */
#app {
  position: relative; z-index: 1;
  display: grid;
  grid-template-rows: 62px 1fr 138px;
  height: 100vh;
  min-height: 0;
}

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  background: rgba(0,0,0,0.28);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.logo { font-family:'Andika', 'Varela Round', sans-serif; font-size:1.75rem; font-weight:700; color:var(--gold); text-shadow:0 0 18px var(--glow-gold); }
.header-right { display:flex; align-items:center; gap:14px; }
.star-progress { display:flex; gap:4px; }
.prog-star { font-size:1.4rem; filter:grayscale(1) brightness(0.3); transition:filter 0.3s; }
.prog-star.earned { filter:drop-shadow(0 0 7px gold); animation:starPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes starPop { from{transform:scale(0) rotate(-30deg);} to{transform:scale(1);} }
.score-pill {
  background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.13);
  border-radius:50px; padding:5px 18px;
  font-weight:700; font-size:1rem; display:flex; align-items:center; gap:6px;
}

/* MIDDLE */
#middle {
  display: grid; grid-template-columns: 240px 1fr 160px;
  align-items: center; padding: 8px 16px 4px 18px; gap: 16px;
  overflow: hidden; min-height: 0;
}

/* OWL COL */
#owl-col { display:flex; flex-direction:column; align-items:center; gap:0; flex-shrink:0; }

.owl-wrap {
  position: relative;
  animation: owlFloat 3.5s ease-in-out infinite;
  filter: drop-shadow(0 0 26px rgba(245,200,66,0.55));
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
@keyframes owlFloat { 0%,100%{transform:translateY(0) rotate(-2.5deg);} 50%{transform:translateY(-12px) rotate(2.5deg);} }

.bubble {
  position: relative;
  background: linear-gradient(135deg, #2a1860, #180f42);
  border: 2.5px solid var(--violet); border-radius: 22px;
  padding: 14px 16px 12px; text-align: center;
  box-shadow: 0 0 28px var(--glow-purple);
  width: 220px; margin-top: 2px;
}
.bubble::after {
  content:''; position:absolute; top:-12px; left:50%;
  transform:translateX(-50%);
  border:7px solid transparent; border-bottom-color:var(--violet);
}
.q-text { font-size:1.15rem; font-weight:700; line-height:1.5; color:#fff; }
.q-num { color:var(--gold); font-size:1.45rem; font-weight:700; }
.speak-btn {
  margin:10px auto 0;
  background:var(--violet); border:none; border-radius:50px;
  color:white; font-family:'Andika', 'Varela Round', sans-serif; font-weight:700; font-size:0.85rem;
  padding:6px 16px; cursor:pointer;
  display:flex; align-items:center; gap:5px; transition:transform 0.15s;
}
.speak-btn:active { transform:scale(0.92); }

/* RIGHT COL */
#right-col { display:flex; flex-direction:column; align-items:center; gap:10px; min-width:0; width:100%; min-height:0; overflow:hidden; }
.tf-label { font-size:0.72rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.3); }
/* Numicon-style ten frame — SVG rendered in JS */
#ten-frame {
  width:100%; max-width:620px;
  filter: drop-shadow(0 4px 18px rgba(108,63,197,0.45));
}
#ten-frame svg { width:100%; height:auto; display:block; }

.eq-row { display:flex; align-items:center; gap:16px; font-family:'Andika', 'Varela Round', sans-serif; font-weight:700; }
.eq-box { width:80px; height:80px; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:2.8rem; }
.eq-given { background:linear-gradient(135deg,#7c3aed,#4c1d95); box-shadow:0 0 22px var(--glow-purple); color:white; }
.eq-blank {
  background:rgba(255,255,255,0.05); border:3px dashed rgba(255,255,255,0.22);
  color:rgba(255,255,255,0.18); font-size:2rem; transition:all 0.3s;
}
.eq-blank.filled {
  background:linear-gradient(135deg,#f5c842,#d97706); border:none; color:#1a0800;
  box-shadow:0 0 24px var(--glow-gold);
  animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from{transform:scale(0.4) rotate(-12deg);} to{transform:scale(1);} }
.eq-total { background:rgba(94,240,176,0.13); border:2px solid rgba(94,240,176,0.38); color:var(--mint); }
.eq-op { font-size:2.4rem; color:rgba(255,255,255,0.4); }

/* ── ANSWER BUTTONS — SVG STARS ── */
#answer-row {
  display:flex; align-items:center; justify-content:center;
  gap:4px; padding:6px 12px 8px;
  background:rgba(0,0,0,0.22); border-top:1px solid rgba(255,255,255,0.06);
  height:138px;
}
.ans-btn {
  flex:1; max-width:116px; height:100%; aspect-ratio:1;
  border:none; background:none; cursor:pointer; padding:0;
  position:relative; display:flex; align-items:center; justify-content:center;
  transition: transform 0.13s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s, filter 0.13s;
  -webkit-tap-highlight-color: transparent;
}
.ans-btn svg { width:100%; height:100%; display:block; }
.ans-btn:active { transform: scale(0.88) translateY(3px); filter: brightness(0.9); }
.ans-btn .btn-num {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-54%);
  font-family:'Andika', 'Varela Round', sans-serif; font-size:1.85rem; font-weight:700; color:#1a0800;
  pointer-events:none; line-height:1;
  text-shadow: 0 1px 0 rgba(255,255,255,0.4);
}
.ans-btn.off {
  opacity:0.18; pointer-events:none;
  transform:scale(0.82) translateY(5px);
  filter:grayscale(1);
}

/* ── FLYING STAR ── */
.fly-star {
  position:fixed; font-size:2.2rem; z-index:999; pointer-events:none;
  will-change:transform,left,top;
  transition: left 0.65s cubic-bezier(0.4,-0.5,0.6,1.1),
              top  0.65s cubic-bezier(0.4,-0.5,0.6,1.1),
              opacity 0.18s linear 0.5s,
              transform 0.65s ease;
}

/* ── CORRECT PAYOFF OVERLAY ── */
#payoff {
  position:fixed; inset:0; z-index:200;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  pointer-events:none; opacity:0; transition:opacity 0.2s;
  background: rgba(0,0,0,0);
  gap: 0;
}
#payoff.show { opacity:1; pointer-events:all; }

.payoff-owl-wrap {
  position:relative; z-index:2; margin-bottom:-20px;
  animation: payoffOwl 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes payoffOwl { from{transform:scale(0) rotate(-15deg);} to{transform:scale(1.05) rotate(2deg);} }

.payoff-card {
  background: white;
  border-radius: 28px;
  border: 4px solid #6c3fc5;
  box-shadow: 0 0 50px rgba(108,63,197,0.6), 0 8px 40px rgba(0,0,0,0.5);
  padding: 32px 52px 26px;
  display: flex; flex-direction:column;
  align-items:center; gap:8px;
  min-width: 340px;
  animation: payoffCard 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.08s both;
}
@keyframes payoffCard { from{transform:scale(0.6);opacity:0;} to{transform:scale(1);opacity:1;} }

.payoff-msg {
  font-family:'Andika', 'Varela Round', sans-serif; font-size:3rem; font-weight:700;
  color: #1a0a40;
  text-align:center; line-height:1.1;
}
.payoff-sub {
  font-family:'Andika', 'Varela Round', sans-serif; font-size:1.6rem; font-weight:700;
  color: #4c1d95;
}
.cf {
  position:absolute; width:12px; height:12px; border-radius:2px;
  animation:cfFall var(--cd) ease-in forwards;
}
@keyframes cfFall { 0%{opacity:1;transform:translate(0,0) rotate(0);} 100%{opacity:0;transform:translate(var(--cx),var(--cy)) rotate(720deg);} }

/* ── CAULDRON — inline in layout ── */
#cauldron-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 0;
}
#cauldron-fx {
  width: 140px; height: 140px;
  pointer-events: none;
  filter: drop-shadow(0 0 14px rgba(94,240,176,0.4));
  transition: filter 0.3s;
  flex-shrink: 0;
}
#cauldron-fx svg { width:100%; height:100%; display:block; }
#cauldron-fx.splashing {
  filter: drop-shadow(0 0 30px rgba(94,240,176,0.95));
  animation: cauldronBounce 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cauldronBounce {
  0%   { transform: scale(1) rotate(0deg); }
  30%  { transform: scale(1.18) rotate(-5deg); }
  60%  { transform: scale(0.93) rotate(3deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.cauldron-label {
  font-size: 0.65rem; font-weight:700; letter-spacing:1.5px;
  text-transform: uppercase; color: rgba(94,240,176,0.5);
}

/* brew bubble particles */
.brew-bubble {
  position:fixed; border-radius:50%; pointer-events:none; z-index:199;
  animation: brewRise var(--bd) ease-out forwards;
}
@keyframes brewRise {
  0%   { transform:translate(0,0) scale(1);   opacity:0.9; }
  100% { transform:translate(var(--bx),var(--by)) scale(0.2); opacity:0; }
}

/* splash star particles */
.splash-star {
  position:fixed; font-size:1.6rem; pointer-events:none; z-index:199;
  animation: splashOut var(--sd) cubic-bezier(0.2,0.8,0.4,1) forwards;
}
@keyframes splashOut {
  0%   { transform:translate(0,0) scale(1.2) rotate(0deg);   opacity:1; }
  100% { transform:translate(var(--sx),var(--sy)) scale(0) rotate(360deg); opacity:0; }
}

/* shake */
.shake{animation:shake 0.4s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-12px);}40%{transform:translateX(12px);}60%{transform:translateX(-8px);}80%{transform:translateX(8px);}}

/* ── FINAL VICTORY ── */
#victory {
  display:none; position:fixed; inset:0;
  background: radial-gradient(ellipse at 50% 30%, #1e0a50, #05040f 80%);
  z-index:300; flex-direction:column;
  align-items:center; justify-content:center;
  padding:0 20px 40px;
  gap:0; text-align:center; overflow:hidden;
}
#victory.show { display:flex; }

/* phase 1 — cauldron stage */
#v-cauldron-stage {
  display:flex; flex-direction:column; align-items:center;
  opacity:0; transition:opacity 0.4s;
  /* small upward nudge so cauldron looks optically centred */
  margin-top:-40px;
}
#v-cauldron-stage.vis { opacity:1; }
#v-cauldron-big {
  width:170px; height:170px;
  filter: drop-shadow(0 0 20px rgba(94,240,176,0.5));
  transition: filter 0.3s;
}
#v-cauldron-big.wild {
  filter: drop-shadow(0 0 50px rgba(245,200,66,0.95));
  animation: vCauldronWild 0.4s ease-in-out infinite alternate;
}
@keyframes vCauldronWild {
  from { transform: scale(1) rotate(-4deg); }
  to   { transform: scale(1.1) rotate(4deg); }
}
#v-cauldron-big.transform-out {
  animation: vCauldronTransform 0.6s cubic-bezier(0.5,-0.3,0.8,1.2) forwards;
}
@keyframes vCauldronTransform {
  0%   { transform:scale(1);   opacity:1; filter:drop-shadow(0 0 40px gold); }
  50%  { transform:scale(1.3); opacity:1; filter:drop-shadow(0 0 80px white); }
  100% { transform:scale(0.1); opacity:0; }
}
.v-cauldron-label {
  font-family:'Andika','Varela Round',sans-serif;
  font-size:1.1rem; font-weight:700;
  color:rgba(94,240,176,0.8); margin-top:8px;
  animation: vLabelPulse 0.8s ease-in-out infinite alternate;
}
@keyframes vLabelPulse {
  from { opacity:0.6; transform:scale(1); }
  to   { opacity:1;   transform:scale(1.04); }
}

/* phase 2 — reveal card */
#v-reveal { display:flex; flex-direction:column; align-items:center; gap:0; }
#v-reveal.hidden-phase { display:none; }

/* v-star particle (fly into victory cauldron) — starts big, shrinks via transform */
.v-fly-star {
  position:fixed; z-index:301; pointer-events:none; line-height:1;
  font-size:3rem; transform-origin:center center;
  transition: left 0.7s cubic-bezier(0.4,0,0.6,1),
              top  0.7s cubic-bezier(0.4,0,0.6,1),
              transform 0.7s cubic-bezier(0.4,0,0.8,1),
              opacity 0.12s linear 0.6s;
}

/* v-bubble burst */
.v-bubble {
  position:fixed; border-radius:50%; pointer-events:none; z-index:301;
  animation: vBubblePop var(--vbd) cubic-bezier(0.2,0.8,0.3,1) forwards;
}
@keyframes vBubblePop {
  0%   { transform:translate(0,0) scale(1);   opacity:0.9; }
  100% { transform:translate(var(--vbx),var(--vby)) scale(0); opacity:0; }
}

.v-owl { line-height:1; animation:owlFloat 2s ease-in-out infinite; margin-bottom:-18px; z-index:2; position:relative; }
.v-card {
  background: white;
  border-radius: 28px;
  border: 4px solid var(--gold);
  box-shadow: 0 0 50px var(--glow-gold), 0 8px 40px rgba(0,0,0,0.6);
  padding: 20px 44px 20px;
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  max-width: 500px; width: 90%;
  animation: cardPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}
@keyframes cardPop { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }
.v-title {
  font-family:'Andika', 'Varela Round', sans-serif;
  font-size: 2.4rem; font-weight:700;
  color: #1a0a40; line-height:1.1;
}
.v-potion {
  display:flex; align-items:center; justify-content:center;
  animation:potionBounce 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  transform-origin:center;
}
.v-potion svg { width:110px!important; height:110px!important; }
@keyframes potionBounce { from{transform:scale(0) rotate(-20deg);} to{transform:scale(1);} }
.v-potion-name {
  font-family:'Andika', 'Varela Round', sans-serif;
  font-size: 1.5rem; font-weight:700; color: #4c1d95;
}
.v-sub { font-size:1rem; color:#374151; font-weight:700; }
.v-btn {
  font-family:'Andika', 'Varela Round', sans-serif; font-size:1.3rem; font-weight:700;
  border:none; border-radius:50px; padding:12px 42px; cursor:pointer; margin-top:6px;
  background:linear-gradient(135deg, var(--violet), #4c1d95); color:white;
  box-shadow:0 5px 0 #2d0d6b, 0 8px 24px rgba(108,63,197,0.5);
  transition:transform 0.15s;
}
.v-btn:active{transform:scale(0.95) translateY(3px);}

/* wrong badge */
#wrong-badge {
  position:fixed; top:80px; left:50%; transform:translateX(-50%);
  z-index:100; pointer-events:none; opacity:0; transition:opacity 0.2s;
}
#wrong-badge.show { opacity:1; }
.wb-inner {
  background:rgba(30,10,60,0.92); border:2.5px solid var(--coral, #ff6b6b);
  border-radius:20px; padding:10px 28px; text-align:center;
  font-family:'Andika', 'Varela Round', sans-serif; font-size:1.8rem; font-weight:700; color:#ff9999;
  box-shadow:0 0 20px rgba(255,100,100,0.3);
  animation:badgePop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes badgePop{from{transform:scale(0.5);}to{transform:scale(1);}}

/* skip button */
.skip-btn {
  position:fixed; bottom:13px; right:16px;
  background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.13);
  border-radius:50px; color:rgba(255,255,255,0.4);
  font-family:'Andika', 'Varela Round', sans-serif; font-weight:700; font-size:0.8rem;
  padding:5px 16px; cursor:pointer; z-index:10;
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<!-- ══ START SCREEN ══ -->
<div id="start-screen" class="screen">
  <div class="start-owl" id="start-owl-emoji"></div>
  <div class="start-title">⭐ Star Soup</div>
  <div class="start-sub">Help the wizard owl brew magical potions!</div>
  <div class="rounds-label">How many rounds?</div>
  <div class="rounds-picker">
    <div class="round-opt selected" data-val="5" onclick="selectRounds(this)">5</div>
    <div class="round-opt" data-val="10" onclick="selectRounds(this)">10</div>
    <div class="round-opt" data-val="15" onclick="selectRounds(this)">15</div>
  </div>
  <button class="big-btn" onclick="startGame()">🪄 Let's Brew!</button>
</div>

<!-- ══ GAME ══ -->
<div id="app" style="display:none;">
  <header>
    <div class="logo">⭐ Star Soup</div>
    <div class="header-right">
      <div class="star-progress" id="star-progress"></div>
      <div class="score-pill">✨ <span id="score-val">0</span></div>
    </div>
  </header>

  <div id="middle">
    <div id="owl-col">
      <div class="owl-wrap" onclick="speakQ()" title="Tap to hear!" id="owl-wrap"></div>

/* ══════════════════════════════════════════

/* owlEmoji defined above */


/* inject owl — emoji owl with SVG wizard hat overlay */
function owlEmoji(size=1, extraStyle=''){
  const s = size;
  // Hat sits above the owl. The SVG viewBox is wider than tall so the hat
  // floats above without overlapping the owl face.
  // top offset: pushes hat up by ~75% of its own rendered height
  const hatW = s * 1.05;   // hat svg width in rem
  const hatH = s * 0.7;    // hat svg height in rem (it's wide/short)
  const topOff = -(hatH * 0.55); // negative = up
  return `<div style="position:relative;display:inline-block;line-height:1;${extraStyle}">
    <span style="font-size:${s}rem;display:block;line-height:1;position:relative;z-index:1;">🦉</span>
    <svg viewBox="0 0 100 65" xmlns="http://www.w3.org/2000/svg"
      style="position:absolute;top:${topOff}rem;left:50%;transform:translateX(-50%);width:${hatW}rem;height:${hatH}rem;pointer-events:none;z-index:2;overflow:visible;">
      <!-- hat cone — sits in top portion of viewBox -->
      <path d="M50,2 C49,5 43,22 39,36 L61,36 C57,22 51,5 50,2Z" fill="#3b24a8"/>
      <path d="M50,2 C52,6 56,20 59,34 L61,36 C57,22 51,5 50,2Z" fill="rgba(0,0,0,0.2)"/>
      <!-- brim -->
      <ellipse cx="50" cy="37" rx="27" ry="6.5" fill="#2a1a80"/>
      <ellipse cx="50" cy="35.5" rx="27" ry="6.5" fill="#4930c0"/>
      <ellipse cx="50" cy="34" rx="25" ry="5" fill="#3b24a8"/>
      <!-- band -->
      <rect x="26" y="30" width="48" height="6.5" rx="3" fill="#3a1e08" opacity="0.85"/>
      <!-- buckle -->
      <rect x="43" y="29" width="14" height="8.5" rx="2.5" fill="#6a3e10"/>
      <rect x="45" y="30.5" width="10" height="5.5" rx="1.5" fill="#4a2808" stroke="#c08820" stroke-width="0.8"/>
      <line x1="50" y1="30.5" x2="50" y2="36" stroke="#c08820" stroke-width="0.9"/>
      <line x1="45" y1="33.5" x2="55" y2="33.5" stroke="#c08820" stroke-width="0.9"/>
      <!-- stars on hat -->
      <polygon points="36,12 37.2,16 41,16 38,18.5 39.2,22.5 36,20 32.8,22.5 34,18.5 31,16 34.8,16" fill="#f5c842" opacity="0.95"/>
      <polygon points="63,17 63.9,20 67,20 64.5,21.8 65.4,24.8 63,23 60.6,24.8 61.5,21.8 59,20 62.1,20" fill="#f5c842" opacity="0.88"/>
      <polygon points="50,10 50.8,13 54,13 51.5,14.8 52.3,18 50,16 47.7,18 48.5,14.8 46,13 49.2,13" fill="#c8b0ff" opacity="0.8"/>
      <!-- tip glow -->
      <circle cx="50" cy="3.5" r="3" fill="#f5c842" opacity="0.85"/>
      <circle cx="50" cy="3.5" r="1.5" fill="white" opacity="0.7"/>
    </svg>
  </div>`;
}

/* Inject owls into placeholders */
function injectOwls(){
  const owlWrap = document.getElementById('owl-wrap');

document.addEventListener('DOMContentLoaded', injectOwls);

/* ══════════════════════════════════════════
   NUMICON SVG TEN FRAME
   filledA = number of purple cells (the given)
   filledUpTo = index up to which gold cells show (-1 = none yet)
   hint = show dashed rings on empty cells
══════════════════════════════════════════ */
function renderNumicon(filledA, filledUpTo, hint=false){
  // Layout: 5 circles per row, 2 rows
  // SVG canvas: 620 wide, 260 tall
  const W=620, H=260;
  const pad=18;       // padding inside border rect
  const gap=12;       // gap between circles
  const cols=5, rows=2;
  const cellW=(W - pad*2 - gap*(cols-1)) / cols;
  const cellH=(H - pad*2 - gap*(rows-1)) / rows;
  const r=Math.min(cellW,cellH)/2 - 4; // circle radius

  let circles='';
  for(let i=0;i<10;i++){
    const col=i%5, row=Math.floor(i/5);
    const cx = pad + col*(cellW+gap) + cellW/2;
    const cy = pad + row*(cellH+gap) + cellH/2;
    const isA  = i < filledA;
    const isB  = i >= filledA && filledUpTo >= 0 && i <= filledUpTo;
    const isEmpty = !isA && !isB;

    let circleFill, circleStroke, circleStrokeW, starText='', starOpacity=1;

    if(isA){
      // Purple filled — given number
      circleFill='url(#purpGrad)';
      circleStroke='#c4b5fd';
      circleStrokeW=2.5;
      starText='⭐';
    } else if(isB){
      // Gold filled — answer revealed
      circleFill='url(#goldGrad)';
      circleStroke='#fde047';
      circleStrokeW=2.5;
      starText='🌟';
    } else if(hint){
      // Hint — dashed gold ring, empty
      circleFill='rgba(245,200,66,0.08)';
      circleStroke='#f5c842';
      circleStrokeW=2.5;
    } else {
      // Empty
      circleFill='rgba(255,255,255,0.04)';
      circleStroke='rgba(180,160,255,0.3)';
      circleStrokeW=2;
    }

    const dashAttr = hint && isEmpty ? 'stroke-dasharray="6 4"' : '';
    const animDelay = isB ? (i-filledA)*0.08 : (isA ? i*0.05 : 0);
    const animStyle = (isA||isB) ? `style="animation:niPop 0.32s cubic-bezier(0.34,1.56,0.64,1) ${animDelay}s both"` : '';

    circles += `<g ${animStyle}>
      <circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${r.toFixed(1)}"
        fill="${circleFill}" stroke="${circleStroke}" stroke-width="${circleStrokeW}" ${dashAttr}/>`;

    if(starText){
      // Use foreignObject for emoji so it renders at a good size
      const fs = r * 1.18;
      circles += `<text x="${cx.toFixed(1)}" y="${(cy+r*0.38).toFixed(1)}"
        text-anchor="middle" font-size="${fs.toFixed(1)}"
        style="user-select:none;">${starText}</text>`;
    }
    circles += `</g>`;
  }

  const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
  <defs>
    <radialGradient id="purpGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>

/* Update a single numicon circle to gold/answer state without re-rendering the whole SVG */
function fillNiCell(idx){
  const svg = document.querySelector('#ten-frame svg');
  if(!svg) return;
  // Circles are inside <g> elements — find by index
  const groups = svg.querySelectorAll('g');
  const g = groups[idx];
  if(!g) return;
  const circle = g.querySelector('circle');
  const oldText = g.querySelector('text');
  if(!circle) return;

  // Update circle to gold
  circle.setAttribute('fill','url(#goldGrad)');
  circle.setAttribute('stroke','#fde047');
  circle.setAttribute('stroke-width','2.5');
  circle.removeAttribute('stroke-dasharray');

  // Replace or add star text
  if(oldText) oldText.remove();
  const cx = parseFloat(circle.getAttribute('cx'));
  const cy = parseFloat(circle.getAttribute('cy'));
  const r  = parseFloat(circle.getAttribute('r'));
  const t  = document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x', cx);
  t.setAttribute('y', cy + r*0.38);
  t.setAttribute('text-anchor','middle');
  t.setAttribute('font-size', (r*1.18).toFixed(1));
  t.style.userSelect='none';
  t.textContent='🌟';
  g.appendChild(t);

  // Pop animation on the group
  g.style.transformBox='fill-box';
  g.style.transformOrigin='center';
  g.style.animation='none';
  void g.getBoundingClientRect(); // force reflow
  g.style.animation='niPop 0.32s cubic-bezier(0.34,1.56,0.64,1) both';
}

const AC=new(window.AudioContext||window.webkitAudioContext)();
const unlock=()=>{ if(AC.state==='suspended') AC.resume(); };
document.addEventListener('pointerdown',unlock,{once:true});

function tone(freq,type='sine',dur=0.18,vol=0.25,delay=0){
  const g=AC.createGain(),o=AC.createOscillator();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+delay+dur);
  o.connect(g); g.connect(AC.destination);
  o.start(AC.currentTime+delay); o.stop(AC.currentTime+delay+dur+0.05);
}

function noise(freq=900,dur=0.22,vol=0.3){
  const len=AC.sampleRate*dur,buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1);
  const s=AC.createBufferSource(); s.buffer=buf;
  const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=0.8;
  const g=AC.createGain(); g.gain.setValueAtTime(vol,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  s.connect(f); f.connect(g); g.connect(AC.destination); s.start(); s.stop(AC.currentTime+dur);
}

// Victory fanfare — proper little melody
function playTwinkleTwinkle(){
  // Twinkle Twinkle — upbeat jazz-tinged, rich harmonics, vibrato feel
  // Tempo: crotchet = 480ms (125bpm, snappy)
  const BPM=170, B=60/BPM; // fast and zippy

  // Helper: play a rich note with multiple layers for warmth
  function richNote(freq, startT, dur, vol=0.32){
    // Fundamental — warm sine
    tone(freq,       'sine',     dur,      vol,      startT);
    // 5th harmonic — adds warmth
    tone(freq*1.5,   'sine',     dur*0.7,  vol*0.18, startT+0.005);
    // Octave — brightness
    tone(freq*2,     'triangle', dur*0.5,  vol*0.14, startT+0.008);
    // Slight detuned copy for chorus/vibrato feel
    tone(freq*1.006, 'sine',     dur*0.9,  vol*0.12, startT+0.003);
    // Attack transient click for definition
    tone(freq*3,     'sine',     0.025,    vol*0.1,  startT);
  }

  // Chord pads — plays a soft triad underneath
  function chordPad(root, startT, dur){
    const third=root*1.2599, fifth=root*1.4983; // equal temperament
    [root,third,fifth].forEach(f=>{
      tone(f,     'sine', dur, 0.08, startT);
      tone(f*0.5, 'sine', dur, 0.10, startT); // bass octave
    });
  }

  // Melody: Twinkle Twinkle Little Star, C major
  // Notes as [freq, beat_number, duration_beats]
  // C=262, D=294, E=330, F=349, G=392, A=440, B=494, C5=523
  const C=262,D=294,E=330,F=349,G=392,A=440,C5=523;
  const mel=[
    // "Twin-kle twin-kle"
    [C,0,1],[C,1,1],[G,2,1],[G,3,1],[A,4,1],[A,5,1],[G,6,2],
    // "lit-tle star"
    [F,8,1],[F,9,1],[E,10,1],[E,11,1],[D,12,1],[D,13,1],[C,14,2],
    // "how I won-der"
    [G,16,1],[G,17,1],[F,18,1],[F,19,1],[E,20,1],[E,21,1],[D,22,2],
    // "what you are"
    [G,24,1],[G,25,1],[F,26,1],[F,27,1],[E,28,1],[E,29,1],[D,30,2],
    // "up a-bove the world so high" — build energy here, go up octave
    [C,32,1],[C,33,1],[G,34,1],[G,35,1],[A,36,1],[A,37,1],[G,38,2],
    // "like a dia-mond in the sky" — big finish
    [F,40,1],[F,41,1],[E,42,1],[E,43,1],[D,44,1],[D,45,1],[C,46,3],
  ];

  // Chord progression: C, C, G, G, Am, F, C, G, C
  const chords=[
    [C*0.5,0,8],[G*0.5,8,8],[C*0.5,16,8],[G*0.5,24,8],[C*0.5,32,8],[F*0.5,40,4],[C*0.5,44,2],[G*0.5,46,1],[C*0.5,47,2],
  ];

  // Walking bass line
  const bass=[
    [C*0.25,0],[E*0.25,1],[G*0.25,2],[E*0.25,3],
    [C*0.25,4],[E*0.25,5],[G*0.25,6],[F*0.25,7],
    [F*0.25,8],[A*0.25,9],[C5*0.25,10],[A*0.25,11],
    [G*0.25,12],[B*0.25,13],[D*0.25,14],[B*0.25,15],
    [C*0.25,16],[E*0.25,17],[G*0.25,18],[E*0.25,19],
    [G*0.25,20],[B*0.25,21],[D*0.25,22],[B*0.25,23],
    [C*0.25,24],[G*0.25,25],[F*0.25,26],[E*0.25,27],
    [D*0.25,28],[E*0.25,29],[F*0.25,30],[G*0.25,31],
    [C*0.25,32],[E*0.25,33],[G*0.25,34],[E*0.25,35],
    [A*0.25,36],[C5*0.25,37],[A*0.25,38],[G*0.25,39],
    [F*0.25,40],[A*0.25,41],[E*0.25,42],[G*0.25,43],
    [D*0.25,44],[F*0.25,45],[C*0.25,46],[C*0.25,47],
  ];

  mel.forEach(([freq,beat,dur])=> richNote(freq, beat*B, dur*B*0.92));
  chords.forEach(([root,beat,dur])=> chordPad(root, beat*B, dur*B*0.9));
  bass.forEach(([freq,beat])=> tone(freq,'sine',B*0.7,0.15,beat*B));

  // Jazzy syncopated hi-hat rhythm (noise bursts on off-beats)
  for(let i=0;i<48;i++){
    if(i%2===1) noise(4000,0.04,0.06); // placeholder — schedule with delay
    // Actually use tone at very high freq for hi-hat feel
    setTimeout(()=>tone(8000,'sine',0.03,0.04), i*B*1000 + B*500);
  }

  // Final shimmer chord
  const endT=(49*B)*1000;
  setTimeout(()=>{
    [C5,C5*1.26,C5*1.5,C5*2].forEach((f,i)=>{
      tone(f,'sine',1.2,0.18,i*0.06);
      tone(f*2,'sine',0.4,0.06,i*0.06);
    });
  }, endT);
}

/* ── GUESS ── */
function guess(n,btn){
  if(state.busy) return;
  unlock();

  if(n===state.ans){
    state.busy=true;
    // fill blank
    const bl=document.getElementById('eq-blank');
    bl.textContent=n; bl.classList.add('filled');
    // fill ten frame answer cells one at a time — no full re-render
    for(let i=state.n;i<state.n+n&&i<10;i++){
      const delay=(i-state.n)*80;
      setTimeout(()=>fillNiCell(i), delay);
    }
    document.querySelectorAll('.ans-btn').forEach(b=>b.classList.add('off'));
    // fly stars then big payoff
    flyStars(btn,n,()=>{
      playSplash();
      cauldronSplash();
      setTimeout(()=>{ playBigCorrect(); showPayoff(); },120);
    });
  } else {
    state.tries++;
    btn.classList.add('off');
    playWrong();
    showWrong();
    // shake
    const b=document.getElementById('bubble');
    b.classList.add('shake'); setTimeout(()=>b.classList.remove('shake'),450);
    if(state.tries>=2) hintFrame();
  }
}

function flyStars(fromBtn,count,onDone){
  const r=fromBtn.getBoundingClientRect();
  const tx=window.innerWidth-90, ty=window.innerHeight-80;
  const num=Math.min(count,8);
  let done=0;
  for(let i=0;i<num;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='fly-star'; el.textContent='⭐';
      const sx=r.left+r.width/2+(Math.random()-0.5)*16;
      const sy=r.top+r.height/2+(Math.random()-0.5)*16;
      el.style.cssText=`left:${sx}px;top:${sy}px;opacity:1;transform:scale(1.2);`;
      document.body.appendChild(el);
      playWhoosh();
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.style.left=tx+'px'; el.style.top=ty+'px';
        el.style.transform='scale(0.1) rotate(540deg)'; el.style.opacity='0';
      }));
      setTimeout(()=>{ el.remove(); done++; if(done===num) onDone(); },720);
    },i*110);
  }
}

  // centre of the cauldron brew surface — roughly 53% down the element
  const cx=rect.left+rect.width*0.5;
  const cy=rect.top+rect.height*0.53;

  // cycle brew colour
  const [c1,c2]=BREW_COLOURS[state.solved % BREW_COLOURS.length];
  const s1=document.getElementById('brew-stop-1');
  const s2=document.getElementById('brew-stop-2');
  if(s1) s1.setAttribute('stop-color',c1);
  if(s2) s2.setAttribute('stop-color',c2);

  // bounce the cauldron
  el.classList.remove('splashing'); void el.offsetWidth;
  el.classList.add('splashing');
  setTimeout(()=>el.classList.remove('splashing'),600);

  // spawn brew bubble particles rising from cauldron
  const bubbleCols=[c1,'rgba(255,255,255,0.7)',c2,'rgba(200,255,230,0.8)'];
  for(let i=0;i<10;i++){
    setTimeout(()=>{
      const b=document.createElement('div');
      b.className='brew-bubble';
      const size=8+Math.random()*14;
      const angle=(Math.random()-0.5)*1.8; // radians spread
      const dist=40+Math.random()*70;
      b.style.cssText=[
        'left:'+(cx+(Math.random()-0.5)*30)+'px',
        'top:'+(cy-4)+'px',
        'width:'+size+'px','height:'+size+'px',
        'background:'+bubbleCols[Math.floor(Math.random()*bubbleCols.length)],
        '--bx:'+(Math.sin(angle)*dist)+'px',
        '--by:'+(-Math.cos(angle)*dist-30)+'px',
        '--bd:'+(0.5+Math.random()*0.5)+'s',
      ].join(';');
      document.body.appendChild(b);
      setTimeout(()=>b.remove(), 1100);
    }, i*45);
  }

  // spawn star splashes
  for(let i=0;i<6;i++){
    setTimeout(()=>{
      const s=document.createElement('div');
      s.className='splash-star';
      const angle=Math.random()*Math.PI*2;
      const dist=50+Math.random()*80;
      s.style.cssText=[
        'left:'+(cx-12)+'px',
        'top:'+(cy-12)+'px',
        '--sx:'+(Math.cos(angle)*dist)+'px',
        '--sy:'+(Math.sin(angle)*dist-20)+'px',
        '--sd:'+(0.5+Math.random()*0.3)+'s',
      ].join(';');
      s.textContent='⭐';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(), 900);
    }, i*60);
  }
}

/* ── BIG PAYOFF OVERLAY ── */
function showPayoff(){
  state.score+=Math.max(1,3-state.tries);
  state.solved++;
  document.getElementById('score-val').textContent=state.score;
  updateProg();

  const msg=OWL_CORRECT[Math.floor(Math.random()*OWL_CORRECT.length)];
  document.getElementById('payoff-msg').textContent=msg;
  document.getElementById('payoff-sub').textContent=`${state.n} + ${state.ans} = 10  ✨`;

  // owl above card
  const po=document.getElementById('payoff-owl');
  po.innerHTML=owlEmoji(5);
  po.style.cssText='display:flex;align-items:center;justify-content:center;';

  const payoff=document.getElementById('payoff');
  payoff.classList.add('show');
  confettiBurst();

  // next round or victory
  const delay=state.round+1>=state.total ? 2200 : 2000;
  setTimeout(()=>{
    payoff.classList.remove('show');
    state.round++;
    if(state.round>=state.total) setTimeout(showVictory,300);
    else genQ();
  },delay);
}

/* ── WRONG BADGE ── */
function showWrong(){
  const msgs=OWL_WRONG;
  document.getElementById('wrong-text').textContent=msgs[Math.floor(Math.random()*msgs.length)];
  const b=document.getElementById('wrong-badge');
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),1200);
}

/* ── CONFETTI ── */
function confettiBurst(){
  const fb=document.getElementById('payoff');
  const cols=['#f5c842','#6c3fc5','#5ef0b0','#ff6b6b','#60a5fa','#f472b6','#fff'];
  for(let i=0;i<55;i++){
    const p=document.createElement('div'); p.className='cf';
    const ang=Math.random()*Math.PI*2, dist=200+Math.random()*350;
    p.style.cssText=`left:50%;top:40%;background:${cols[Math.floor(Math.random()*cols.length)]};--cx:${Math.cos(ang)*dist}px;--cy:${Math.sin(ang)*dist+60}px;--cd:${0.9+Math.random()*0.8}s;border-radius:${Math.random()>.4?'50%':'2px'};width:${8+Math.random()*8}px;height:${8+Math.random()*8}px;`;
    fb.appendChild(p); setTimeout(()=>p.remove(),2000);
  }
}

/* ── HINT ── */
function hintFrame(){
  renderNumicon(state.n, -1, true);
}

/* ── PROGRESS ── */
function updateProg(){
  const p=document.getElementById('star-progress');
  p.innerHTML='';
  for(let i=0;i<state.total;i++){
    const s=document.createElement('span');
    s.className='prog-star'+(i<state.solved?' earned':'');
    s.textContent='⭐'; p.appendChild(s);
  }
}

/* ── VICTORY — sequenced animation ── */
function showVictory(){
  const potion=POTIONS[Math.floor(Math.random()*POTIONS.length)];
  const v=document.getElementById('victory');
  v.classList.add('show');

  // reset phases
  const stage=document.getElementById('v-cauldron-stage');
  const reveal=document.getElementById('v-reveal');
  const vcBig=document.getElementById('v-cauldron-big');
  stage.classList.remove('vis');
  reveal.classList.add('hidden-phase');
  vcBig.classList.remove('wild','transform-out');

  // PHASE 1a — show cauldron (fade in)
  requestAnimationFrame(()=>{ stage.classList.add('vis'); });

  // PHASE 1b — stars fly from all over screen into cauldron
  const cauldronRect=()=>{ const r=vcBig.getBoundingClientRect(); return {cx:r.left+r.width*0.5, cy:r.top+r.height*0.53}; };
  const starCount=12;
  for(let i=0;i<starCount;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='v-fly-star'; el.textContent='⭐';
      // start from random edges of screen
      const edge=Math.floor(Math.random()*4);
      let sx,sy;
      if(edge===0){ sx=Math.random()*window.innerWidth; sy=-40; }
      else if(edge===1){ sx=window.innerWidth+40; sy=Math.random()*window.innerHeight; }
      else if(edge===2){ sx=Math.random()*window.innerWidth; sy=window.innerHeight+40; }
      else { sx=-40; sy=Math.random()*window.innerHeight; }
      // start big (random scale 1.8–3.5), shrink to tiny as they hit cauldron
      const startScale=1.8+Math.random()*1.7;
      el.style.cssText=`left:${sx-24}px;top:${sy-24}px;opacity:1;transform:scale(${startScale.toFixed(1)});`;
      document.body.appendChild(el);
      playWhoosh();
      const {cx,cy}=cauldronRect();
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        el.style.left=(cx-24)+'px'; el.style.top=(cy-24)+'px';
        el.style.transform='scale(0.05)'; el.style.opacity='0';
      }));
      setTimeout(()=>{
        el.remove();
        // each star landing: small cauldron bounce + colour shift
        const cols=BREW_COLOURS[i % BREW_COLOURS.length];
        const s1=document.getElementById('v-brew-stop-1');
        const s2=document.getElementById('v-brew-stop-2');
        if(s1) s1.setAttribute('stop-color',cols[0]);
        if(s2) s2.setAttribute('stop-color',cols[1]);
        playSplash();
      }, 720);
    }, 200 + i*100);
  }

  // PHASE 1c — after all stars landed, go wild
  const wildStart = 200 + starCount*100 + 150;
  setTimeout(()=>{
    vcBig.classList.add('wild');
    document.getElementById('v-cauldron-label').textContent='Something magical is happening...';
    // cycle colours fast
    let ci=0;
    const colInterval=setInterval(()=>{
      const cols=BREW_COLOURS[ci % BREW_COLOURS.length];
      const s1=document.getElementById('v-brew-stop-1');
      const s2=document.getElementById('v-brew-stop-2');
      if(s1) s1.setAttribute('stop-color',cols[0]);
      if(s2) s2.setAttribute('stop-color',cols[1]);
      playSplash();
      // big bubble bursts from cauldron
      const {cx,cy}=cauldronRect();
      for(let b=0;b<8;b++){
        const bEl=document.createElement('div');
        bEl.className='v-bubble';
        const ang=Math.random()*Math.PI*2, dist=60+Math.random()*120;
        const size=10+Math.random()*18;
        bEl.style.cssText=[
          'left:'+(cx+(Math.random()-0.5)*20)+'px',
          'top:'+(cy)+'px',
          'width:'+size+'px','height:'+size+'px',
          'background:'+cols[0],
          '--vbx:'+(Math.cos(ang)*dist)+'px',
          '--vby:'+(Math.sin(ang)*dist-40)+'px',
          '--vbd:'+(0.4+Math.random()*0.4)+'s',
        ].join(';');
        document.body.appendChild(bEl);
        setTimeout(()=>bEl.remove(), 900);
      }
      ci++;
    }, 220);

    // PHASE 1d — transform cauldron out after wild phase
    setTimeout(()=>{
      clearInterval(colInterval);
      vcBig.classList.remove('wild');
      vcBig.classList.add('transform-out');
      playBigCorrect();
    }, 350);

    // PHASE 2 — reveal card + music (350 wild + 600 transform + 100 gap = 1050ms)
    setTimeout(()=>{
      stage.classList.remove('vis');
      reveal.classList.remove('hidden-phase');

      // inject owl
      const vOwl=document.getElementById('v-owl');
      if(vOwl) vOwl.innerHTML=owlEmoji(5.5);

      // potion
      const vp=document.getElementById('v-potion');
      vp.innerHTML=potion.svg;
      vp.style.animation='none'; void vp.offsetWidth; vp.style.animation='';
      document.getElementById('v-potion-name').textContent=potion.name;
      document.getElementById('v-sub').textContent=`${potion.desc} Score: ${state.score} ✨`;

      // confetti burst
      const cols2=['#f5c842','#6c3fc5','#5ef0b0','#ff6b6b','#60a5fa','#f472b6','#fff','#a78bfa'];
      for(let i=0;i<80;i++){
        const p=document.createElement('div'); p.className='cf';
        const ang=Math.random()*Math.PI*2, dist=250+Math.random()*450;
        p.style.cssText=`left:50%;top:35%;background:${cols2[Math.floor(Math.random()*cols2.length)]};--cx:${Math.cos(ang)*dist}px;--cy:${Math.sin(ang)*dist+80}px;--cd:${1.2+Math.random()*1.2}s;border-radius:${Math.random()>.4?'50%':'2px'};width:${10+Math.random()*10}px;height:${10+Math.random()*10}px;`;
        v.appendChild(p); setTimeout(()=>p.remove(),3000);
      }

      playTwinkleTwinkle();
    }, wildStart + 1400);

  }, wildStart);
}

/* ── SKIP ── */
function skipQ(){
  if(state.busy) return;
  state.round++;
  if(state.round>=state.total) showVictory();
  else genQ();
}
</script>
